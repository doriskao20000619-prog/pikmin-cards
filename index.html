<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pikmin Bloom 明信片記錄</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>

<style>
/* ── BASE & VARIABLES ── */
:root {
  --green: #4caf6e;
  --green-light: #a8ddb8;
  --green-dark: #2e7d4f;
  --mushroom: #f5a623;
  --mushroom-light: #fde0a0;
  --mushroom-dark: #b8710a;
  --flower: #e96fad;
  --flower-light: #f9c8e3;
  --flower-dark: #b0457e;
  --bg: #f0f7f2;
  --card: #ffffff;
  --text: #1a2e22;
  --sub: #6b8c76;
  --border: #d4e8da;
  --shadow: 0 4px 20px rgba(46,125,79,0.08);
  --danger: #FF3B30; 
  --star-gold: #FFCC00; 
  --dock-icon-inactive: #a0a0a0;
  --dock-icon-active: #111111;
  --dock-add-bg: linear-gradient(135deg, #c4fc62, #a8ff4a);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── HOME SCREEN ── */
.home-header { background: linear-gradient(160deg, #1e5c36 0%, #3a9e60 55%, #6ecf8a 100%); padding: 48px 20px 40px; }
.home-topbar { display: flex; justify-content: space-between; align-items: center; }
.home-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; }

/* 🌟 將頭像改為雲端同步按鈕 🌟 */
.home-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s; }
.home-avatar:active { transform: scale(0.9); }
.home-avatar.synced { background: #4caf6e; border-color: #fff; }

.home-body { padding: 24px 20px 140px; } 
.home-section-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }
.home-section-title:first-child { margin-top: 0; }

.category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.cat-btn { border-radius: 24px; padding: 24px 16px; border: none; cursor: pointer; text-align: left; transition: transform 0.15s; box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
.cat-btn:active { transform: scale(0.97); }
.cat-btn.flower-btn { background: linear-gradient(135deg, #f9c8e3, #f0a0cc); }
.cat-btn.mushroom-btn { background: linear-gradient(135deg, #fde0a0, #f5c060); }
.cat-btn .cat-icon { font-size: 2.4rem; display: block; margin-bottom: 8px; }
.cat-btn .cat-label { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.1rem; color: #3a1a2e; }
.cat-btn .cat-count { font-size: 0.78rem; font-weight: 700; color: rgba(0,0,0,0.4); margin-top: 2px; }

.search-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
.search-input { width: 100%; padding: 14px 16px 14px 44px; border-radius: 16px; border: 1.5px solid var(--border); background: #fff; font-size: 0.95rem; font-weight: 500; outline: none; box-shadow: var(--shadow); transition: all 0.2s; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 1.1rem; }

/* ── CATEGORY LAYOUT & FILTERS ── */
.cat-screen-header { position: sticky; top: 0; z-index: 50; background: var(--bg); }
.cat-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: var(--card); border-bottom: 1.5px solid var(--border); }
.back-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text); padding: 4px; }
.cat-topbar-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.1rem; flex: 1; text-align: center; } 
.toggle-hide-btn { background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 6px 12px; font-size: 0.75rem; font-weight: 800; color: var(--sub); cursor: pointer; }

.sub-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.sub-tab { flex: 1; padding: 14px 10px; text-align: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; }
.sub-tab.active { color: var(--green-dark); border-bottom-color: var(--green); }

.quick-filter-wrapper { display: flex; gap: 10px; padding: 14px 16px; background: var(--bg); overflow-x: auto; scrollbar-width: none; border-bottom: 1.5px solid var(--border); align-items: center; cursor: grab; }
.quick-filter-wrapper:active { cursor: grabbing; }
.quick-filter-wrapper::-webkit-scrollbar { display: none; }
.filter-pill { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 99px; border: 1.5px solid var(--border); background: #ffffff; color: var(--sub); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; user-select: none;}
.filter-pill.active { background: #4a7c59; color: #ffffff; border-color: #4a7c59; }

.add-theme-btn { display: flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 99px; border: 1.5px dashed var(--sub); background: transparent; color: var(--sub); font-weight: 900; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }

.cat-body { padding: 16px 16px 140px; }
.group-section { margin-bottom: 24px; }
.group-header { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.group-count { background: var(--border); color: var(--sub); border-radius: 99px; padding: 2px 10px; font-size: 0.7rem; }

/* ── POSTCARD CARDS ── */
.postcard-wrapper { position: relative; margin-bottom: 14px; border-radius: 20px; background: var(--danger); overflow: hidden; }
.delete-action { position: absolute; top: 0; right: 0; bottom: 0; width: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.85rem; cursor: pointer; z-index: 1; }

.postcard { background: var(--card); border-radius: 20px; border: 1.5px solid var(--border); display: flex; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s, border-color 0.3s; position: relative; z-index: 2; user-select: none; touch-action: pan-y; }
.postcard.swiped { transform: translateX(-75px); }
.postcard.is-owned { background: #f2faf4 !important; border-color: var(--green) !important; }

.postcard-thumb { width: 145px; min-width: 145px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-right: 1.5px solid var(--border); cursor: zoom-in; position: relative; }
.postcard-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: center; }

.image-time-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(4px);
  color: var(--green-dark);
  font-size: 0.65rem;
  font-weight: 800;
  padding: 4px 8px;
  border-radius: 8px;
  z-index: 5;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 3px;
}

.stack-time-badge {
  position: absolute;
  bottom: 16px;
  left: 24px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(4px);
  color: var(--green-dark);
  font-size: 0.65rem;
  font-weight: 800;
  padding: 4px 8px;
  border-radius: 8px;
  z-index: 5;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.postcard-info { flex: 1; padding: 14px 14px; display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden; }

.mac-btns-container { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; z-index: 10; }
.mac-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: rgba(142, 142, 147, 0.1); border: none; border-radius: 50%; color: #8E8E93; cursor: pointer; transition: all 0.2s; }
.mac-btn svg { width: 15px; height: 15px; stroke-width: 2.5; margin: auto; pointer-events: none; }
.mac-btn.star-btn.is-favorite { background: #FFF9E5; color: var(--star-gold); }

@media (max-width: 768px) and (pointer: coarse) {
  .postcard .mac-btn.del-btn { display: none !important; }
}

.modal-action-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; background: rgba(142, 142, 147, 0.12); border: none; border-radius: 50%; color: #8E8E93; cursor: pointer; transition: all 0.2s; flex-shrink: 0;}
.modal-action-btn svg { width: 16px; height: 16px; stroke-width: 2.5; pointer-events: none; }
.modal-action-btn.edit-btn:hover { background: #E5F1FF; color: #007AFF; }
.modal-action-btn.del-btn:hover { background: #FFE5E5; color: #FF3B30; }

.postcard-name-row { padding-right: 116px; width: 100%; box-sizing: border-box; overflow: hidden; } 
.postcard-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; line-height: 1.3; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

.local-time-badge, .tag, .coord-btn { height: 28px; box-sizing: border-box; border-radius: 99px; padding: 0 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; width: fit-content; font-family: 'Nunito', sans-serif; }
.local-time-badge, .tag { background: #ffffff; color: var(--green-dark); font-size: 0.68rem; border: 1px solid #ffffff; box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.08); }
.tag { color: var(--sub); }

.coord-btn { 
  background: #f0f7f2; border: 1.5px solid var(--green-light); 
  font-size: 0.7rem; font-family: 'Courier New', Courier, monospace; 
  color: var(--green-dark); cursor: pointer; padding: 0 10px; 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  max-width: 100%; flex-shrink: 1; 
}

.owned-badge { background: var(--green); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 6px rgba(76, 175, 110, 0.3); }

.postcard-loc-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; margin-bottom: 4px; flex-wrap: wrap; }
.postcard-loc { font-size: 0.75rem; color: var(--sub); font-weight: 500; display: flex; align-items: center; gap: 4px;}
.postcard-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.postcard-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; width: 100%; gap: 6px; }

/* ── LIGHTBOX ── */
.lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; backdrop-filter: blur(15px); }
.lightbox-overlay.open { display: flex; }
.lightbox-frame { width: 92vw; max-width: 600px; aspect-ratio: 1.4 / 1; overflow: hidden; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.7); background: #000; }
.lightbox-img { width: 100%; height: 100%; object-fit: contain; object-position: center; }

/* ── 全黑裁切畫面樣式 ── */
.crop-modal-overlay { display: none; position: fixed; inset: 0; background: #000000; z-index: 9999; flex-direction: column; }
.crop-modal-overlay.open { display: flex; }
.crop-header { display: flex; justify-content: space-between; padding: max(24px, env(safe-area-inset-top)) 20px 20px; align-items: center; flex-shrink: 0; }
.crop-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
.crop-btn.primary { background: var(--green); color: #fff; }
.crop-container { 
  flex: 1; position: relative; overflow: hidden; 
  width: 100%; display: block;
}
.crop-container img { max-width: 100%; max-height: 100%; display: block; margin: 0 auto; }

.cropper-view-box { outline: 3px solid var(--green); border-radius: 4px; }
.cropper-line { background-color: transparent; }
.cropper-point { background-color: var(--green); width: 26px; height: 26px; opacity: 1; border-radius: 50%; }
.cropper-point.point-se { bottom: -13px; right: -13px; }
.cropper-point.point-sw { bottom: -13px; left: -13px; }
.cropper-point.point-ne { top: -13px; right: -13px; }
.cropper-point.point-nw { top: -13px; left: -13px; }
.cropper-point.point-n, .cropper-point.point-s, .cropper-point.point-e, .cropper-point.point-w { display: none; }

/* ── MODALS ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
#manageThemeModal { z-index: 450; } 
#addThemeModal { z-index: 500; }    

.modal { background: var(--card); border-radius: 30px 30px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 45px; animation: slideUp 0.3s ease; display: flex; flex-direction: column; position: relative; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle { 
  width: 45px; height: 5px; background: #ddd; border-radius: 99px; margin: 0 auto 20px; flex-shrink:0; position: relative;
}
.modal-handle::after {
  content: ''; position: absolute; top: -15px; bottom: -15px; left: -20px; right: -20px;
}
.modal-title { font-weight: 900; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 100%; display: block; color: var(--text); }

.hide-scrollbar::-webkit-scrollbar { display: none; }

.batch-results-container { display: none; max-height: 450px; overflow-y: auto; padding: 4px; margin-bottom: 20px; scrollbar-width: none; }
.batch-item { margin-bottom: 14px; }
.batch-confirm-box { background: #ffffff; border: 1.5px solid var(--green-light); border-radius: 20px; padding: 22px; text-align: center; }
.confirm-label { font-size: 0.85rem; color: var(--sub); font-weight: 800; margin-bottom: 8px; }
.confirm-coord { font-size: 1.3rem; font-family: monospace; font-weight: 900; color: var(--green-dark); margin-bottom: 16px; }
.confirm-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-confirm-yes { background: var(--green); color: white; border: none; border-radius: 15px; padding: 14px; font-weight: 800; cursor: pointer; font-size: 1rem; }
.btn-confirm-no { background: #f5fdf8; color: var(--sub); border: none; border-radius: 15px; padding: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.batch-preview-box { background: #f5fdf8; border: 1.5px solid var(--green-light); border-radius: 20px; padding: 20px; position: relative; }

.res-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.res-main-title { font-size: 1.15rem; font-weight: 900; color: var(--text); flex: 1; display: flex; align-items: center; flex-wrap: nowrap; gap: 8px; overflow: hidden; }
.res-main-title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: inline-block; }
.duplicate-badge { background: #ffe5e5; color: var(--danger); font-size: 0.7rem; font-weight: 900; padding: 3px 8px; border-radius: 99px; flex-shrink: 0; }
.res-coord-sub { font-size: 0.95rem; font-family: 'Courier New', Courier, monospace; font-weight: 700; color: var(--sub); }

.edit-label { font-size: 0.85rem; font-weight: 800; color: var(--sub); margin-bottom: 8px; margin-left: 4px; }
.edit-input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 20px; flex-shrink:0;}

.edit-text-input { 
  width: 100%; padding: 16px 54px 16px 16px; 
  border: none; border-radius: 16px; font-family: 'Courier New', Courier, monospace; 
  font-size: 1.05rem; color: var(--green-dark); font-weight: 800; 
  background: #ffffff; outline: none; box-sizing: border-box;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.06); 
}
.edit-text-input.no-icon { padding-right: 16px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); }

.reset-input-btn { position: absolute; right: 10px; width: 36px; height: 36px; background: rgba(142, 142, 147, 0.15); border: none; border-radius: 10px; color: var(--sub); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
.reset-input-btn:hover { background: rgba(142, 142, 147, 0.3); color: var(--text); }
.reset-input-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; pointer-events: none; }

.type-toggle { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
.type-btn { flex: 1; padding: 14px; border-radius: 16px; border: 1.5px solid var(--border); background: #f9fbf9; color: var(--sub); font-weight: 800; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; }
.type-btn.flower.active { background: #fdf2f8; border-color: var(--flower); color: var(--flower-dark); }
.type-btn.mushroom.active { background: #fffcf2; border-color: var(--mushroom); color: var(--mushroom-dark); }

.theme-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; max-height: 180px; overflow-y: auto; scrollbar-width: none; align-content: flex-start; cursor: grab; }
.theme-selector:active { cursor: grabbing; }
.theme-option { padding: 8px 16px; border-radius: 99px; border: 1.5px solid var(--border); font-size: 0.85rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; background: #fff; color: var(--sub); transition: all 0.2s; user-select: none; }
.theme-option.selected { background: var(--green); color: #fff; border-color: var(--green); }

.emoji-picker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-height: 200px; overflow-y: auto; padding: 10px; border: 1.5px solid var(--border); border-radius: 16px; margin-bottom: 16px; }
.emoji-item { font-size: 1.6rem; text-align: center; cursor: pointer; padding: 8px; border-radius: 10px; transition: background 0.2s; }
.emoji-item:hover { background: #f5fdf8; }
.emoji-item.selected { background: var(--green-light); box-shadow: 0 0 0 2px var(--green); }

.custom-theme-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 300px; margin-bottom: 20px; padding: 4px;}
.custom-theme-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 16px; background: #fff; font-weight: 800; font-size: 0.95rem; }
.theme-action-group { display: flex; gap: 8px; }

.btn-primary { width: 100%; background: linear-gradient(135deg, var(--green-dark), var(--green)); color: #fff; border: none; border-radius: 16px; padding: 16px; font-weight: 900; font-size: 1.05rem; cursor: pointer; box-shadow: 0 4px 12px rgba(46,125,79,0.25); flex-shrink: 0;}
.btn-danger { width: 100%; background: linear-gradient(135deg, #FF3B30, #D92B22); color: #fff; border: none; border-radius: 16px; padding: 16px; font-weight: 900; font-size: 1.05rem; cursor: pointer; flex-shrink: 0;}
.btn-cancel { width: 100%; background: none; border: none; color: var(--sub); padding: 10px; font-weight: 700; font-size: 0.88rem; cursor: pointer; margin-top: 6px; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(12px); background: #1a2e22; color: #fff; padding: 12px 26px; border-radius: 99px; font-weight: 700; font-size: 0.9rem; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.2); white-space: nowrap; max-width: 90vw; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.global-dropzone { display: none; position: fixed; inset: 0; background: rgba(240, 247, 242, 0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.global-dropzone.active { display: flex; }
.dropzone-box { border: 1px dashed var(--green); border-radius: 24px; padding: 60px 40px; text-align: center; max-width: 400px; width: 80%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.dropzone-icon { font-size: 4rem; margin-bottom: 16px; color: var(--green); }
.dropzone-text { font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--green-dark); margin-bottom: 8px; }
.dropzone-sub { font-size: 0.9rem; font-weight: 700; color: var(--sub); }
.btn-select-file { background: #3b82f6; color: white; border: none; border-radius: 99px; padding: 12px 32px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 24px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); transition: transform 0.15s; }
.btn-select-file:active { transform: scale(0.96); }

/* 🌟 我的收藏頁：明信片層疊 (Accordion Cards) UI 🌟 */
.postcard-stack { display: flex; flex-direction: column; padding: 10px 0 100px; }
.stack-card {
  border-radius: 28px;
  background: var(--card);
  box-shadow: 0 -8px 24px rgba(0,0,0,0.1);
  position: relative;
  z-index: 1;
  transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  cursor: pointer;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.05);
  touch-action: pan-y;
}
.stack-card + .stack-card { margin-top: -110px; } 
.stack-card.expanded {
  z-index: 10;
  box-shadow: 0 16px 40px rgba(0,0,0,0.18);
  margin-bottom: 24px;
}
.stack-card + .stack-card.expanded { margin-top: 24px; } 
.stack-card.expanded + .stack-card { margin-top: 24px; }

@media (hover: hover) {
  .stack-card:not(.expanded):hover {
    transform: translateY(-20px) scale(1.02);
    box-shadow: 0 -16px 36px rgba(0,0,0,0.18);
    z-index: 5;
  }
  .stack-card:not(.expanded):hover ~ .stack-card:not(.expanded) {
    transform: translateY(16px);
  }
}
.stack-card.is-peeking:not(.expanded) {
  transform: translateY(-20px) scale(1.02);
  box-shadow: 0 -16px 36px rgba(0,0,0,0.18);
  z-index: 5;
}
.stack-card.is-peeking:not(.expanded) ~ .stack-card:not(.expanded) {
  transform: translateY(16px);
}

.stack-thumb {
  height: 180px;
  width: 100%;
  background-size: cover;
  background-position: center 20%;
  position: relative;
  transition: height 0.5s cubic-bezier(0.32, 0.72, 0, 1);
}
.stack-card.expanded .stack-thumb { height: 240px; cursor: zoom-in; } 
.stack-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 50%);
  pointer-events: none; 
}
.stack-title {
  position: absolute; top: 24px; left: 24px; right: 60px;
  color: #fff; font-weight: 900; font-size: 1.3rem; z-index: 2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.stack-indicator {
  position: absolute; top: 20px; right: 20px; z-index: 2;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.25); backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: transform 0.5s;
}
.stack-card.expanded .stack-indicator { transform: rotate(180deg); }

.stack-info { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
.stack-info-inner { overflow: hidden; opacity: 0; transition: opacity 0.4s, padding 0.4s; background: #fff; }
.stack-card.expanded .stack-info { grid-template-rows: 1fr; }
.stack-card.expanded .stack-info-inner { padding: 24px; opacity: 1; }

<script>
// 🌟 雲端同步設定 🌟
const GOOGLE_CLIENT_ID = '860667269256-ndj7kvt7es64r5in4p5gm7cf6iact7m4.apps.googleusercontent.com'; 
const GOOGLE_API_KEY = 'AIzaSyA6pVGOf9J7O0yt8X2_snLKoHrs9ZF4g8U'; 
const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata'; 

let tokenClient;
let gapiInited = false;
let gisInited = false;
let driveFileId = localStorage.getItem('pikmin_driveFileId') || null;

// 初始化 Google API Client
async function initializeGapiClient() {
    await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: [DISCOVERY_DOC] });
    gapiInited = true;
}
function gapiLoaded() { gapi.load('client', initializeGapiClient); }

// 初始化 Google 登入 (GIS)
function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
            if (resp.error !== undefined) { throw (resp); }
            document.getElementById('cloud-sync-btn').innerText = '🔄';
            document.getElementById('cloud-sync-btn').classList.add('synced');
            await checkAndSyncDriveFile();
        },
    });
    gisInited = true;
}

// 點擊雲端按鈕
function handleAuthClick() {
    if (GOOGLE_CLIENT_ID.includes('你的_') || GOOGLE_API_KEY.includes('你的_')) {
        showToast('⚠️ 請先在程式碼中填寫 Google API 金鑰');
        return;
    }
    // 如果還沒取得 Token，要求登入授權
    if (gapi.client.getToken() === null) {
        tokenClient.requestAccessToken({prompt: 'consent'});
    } else {
        // 如果已經登入，直接同步
        checkAndSyncDriveFile();
    }
}

// 尋找雲端是否有存檔，有就下載，沒有就建立
async function checkAndSyncDriveFile() {
    try {
        showToast('🔄 正在連接 Google Drive...');
        const response = await gapi.client.drive.files.list({
            spaces: 'appDataFolder',
            q: "name='pikmin_data_v1.json'",
            fields: 'files(id, name)'
        });
        const files = response.result.files;
        if (files && files.length > 0) {
            driveFileId = files[0].id;
            localStorage.setItem('pikmin_driveFileId', driveFileId);
            await downloadFromDrive();
        } else {
            await createInDrive();
        }
        document.getElementById('cloud-sync-btn').innerText = '☁️';
        document.getElementById('cloud-sync-btn').style.background = '#4caf6e';
        document.getElementById('cloud-sync-btn').style.borderColor = '#fff';
        document.getElementById('cloud-sync-btn').style.color = '#fff';
    } catch (err) {
        console.error(err);
        showToast('❌ 雲端連接失敗');
    }
}

// 下載雲端資料並覆蓋本地
async function downloadFromDrive() {
    try {
        const response = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
        const dataObj = typeof response.result === 'string' ? JSON.parse(response.result) : response.result;
        
        if(dataObj.flowerCards) flowerCards = dataObj.flowerCards;
        if(dataObj.mushroomCards) mushroomCards = dataObj.mushroomCards;
        if(dataObj.customThemes) customThemes = dataObj.customThemes;
        
        saveDataToLocal(true); // 存入 localStorage 但不觸發再次上傳
        refreshCurrentView();
        showToast('✅ 已從雲端載入最新資料');
    } catch (err) {
        console.error('Download error', err);
    }
}

// 將目前的資料寫入雲端硬碟
async function uploadToCloud() {
    if (!driveFileId || gapi.client.getToken() === null) return;
    
    const fileContent = JSON.stringify({ flowerCards, mushroomCards, customThemes, lastUpdate: new Date().toISOString() });
    const file = new Blob([fileContent], {type: 'application/json'});
    
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({mimeType: 'application/json'})], {type: 'application/json'}));
    form.append('file', file);

    try {
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`, {
            method: 'PATCH',
            headers: new Headers({ 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }),
            body: form
        });
        console.log('✅ 雲端同步完成');
    } catch (err) {
        console.error('Upload error', err);
    }
}

// 初次建立雲端檔案
async function createInDrive() {
    const fileContent = JSON.stringify({ flowerCards, mushroomCards, customThemes, lastUpdate: new Date().toISOString() });
    const file = new Blob([fileContent], {type: 'application/json'});
    const metadata = { name: 'pikmin_data_v1.json', parents: ['appDataFolder'], mimeType: 'application/json' };
    
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    form.append('file', file);

    try {
        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',

function getLocalTime(tz) { 
  try { 
    const now = new Date();
    const locDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }).format(now);
    const tgtDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: tz }).format(now);
    const tgtTimeStr = new Intl.DateTimeFormat('zh-TW', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false }).format(now);
    
    let prefix = "";
    if (locDateStr === tgtDateStr) { prefix = "今日 "; } 
    else {
      const lD = new Date(locDateStr); const tD = new Date(tgtDateStr);
      const diff = (tD - lD) / 86400000;
      if (diff === 1) prefix = "明日 "; else if (diff === -1) prefix = "昨日 "; else prefix = tgtDateStr.substring(5).replace('-','/') + " ";
    }
    return prefix + tgtTimeStr; 
  } catch(e) { return '--:--'; } 
}

async function resizeForOCR(imgUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxDim = 800;
            let scale = 1;
            if (img.width > maxDim || img.height > maxDim) {
                scale = Math.min(maxDim / img.width, maxDim / img.height);
            }
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = imgUrl;
    });
}

async function preloadOCR(fileIndex, imgUrl) {
    ocrCache[fileIndex] = { done: false, progress: 0 };
    try {
        const base64Image = imgUrl.split(',')[1];
        
        const response = await fetch(GAS_CLOUD_OCR_URL, {
            method: 'POST',
            body: JSON.stringify({ image: base64Image })
        });
        
        const data = await response.json();
        const text = data.text || "";

        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);
        let foundCoord = '';
        
        const coordRegex = /-?\d{1,3}\.\d+\s*[,，]\s*-?\d{1,3}\.\d+/;
        
        for(let i=0; i<lines.length; i++){
            const match = lines[i].match(coordRegex);
            if(match) {
                foundCoord = match[0].replace('，', ',');
                break;
            }
        }

        const ignoreList = ['pikmin', 'bloom', '一般', '蘑菇', 'cleared', '點', '今日', '昨日', '串文', 'threads', '查看動態', '新增回覆', '留言', '分享', '次瀏覽', '明信片', '皮克敏', '最相關', '回覆', '送出'];
        const validLines = lines.filter(l => {
            const lower = l.toLowerCase();
            if (lower.length <= 1) return false;
            if (lower.match(/^[0-9.,:\-\s]+$/)) return false; 
            if (ignoreList.some(ignore => lower.includes(ignore))) return false;
            if (lower.match(/\d+\s*(小時|分鐘)/)) return false; 
            if (lower.match(/\d+\s*次瀏覽/)) return false; 
            if (lower.match(/^\d{1,4}[/.-]\d{1,2}[/.-]\d{1,4}$/)) return false; // 日期格式
            return true;
        });

        let foundName = validLines.length > 0 ? validLines[0] : '未命名明信片';

        ocrCache[fileIndex].done = true;
        ocrCache[fileIndex].name = foundName.substring(0, 40);
        ocrCache[fileIndex].coord = foundCoord;
        
        applyOcrToBatch(fileIndex);

    } catch(e) {
        console.error('Cloud OCR Error:', e);
        ocrCache[fileIndex].done = true;
        ocrCache[fileIndex].name = '雲端辨識失敗';
        ocrCache[fileIndex].coord = '';
        applyOcrToBatch(fileIndex);
    }
}

function applyOcrToBatch(fileIndex) {

async function fetchTimeZone(lat, lon) {
    try {
        const res = await fetch(`https://timeapi.io/api/TimeZone/coordinate?latitude=${lat}&longitude=${lon}`);
        const data = await res.json();
        if(data && data.timeZone) return data.timeZone;
    } catch(e) {
        console.log('TimeAPI failed, fallback to ISS API');
    }
    
    try {
        const res = await fetch(`https://api.wheretheiss.at/v1/coordinates/${lat},${lon}`);
        const data = await res.json();
        if(data && data.timezone_id) return data.timezone_id;
    } catch(e) {}
    
    return null;
}

async function fetchLocationForBatchItem(index, lat, lon) {
    let locPreview = document.getElementById(`batch-loc-preview-${index}`);
    if(locPreview) locPreview.innerText = '🔍 偵測地點與時區中...';
    try {
        const [locRes, tz] = await Promise.all([
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-TW`),
            fetchTimeZone(lat, lon)
        ]);
        
        if (tz) tempBatchList[index].tz = tz; 
        
        const data = await locRes.json();
        if (data && data.address) {
            const addr = data.address;
            const country = cleanLocText(addr.country);
            const cityRaw = addr.city || addr.town || addr.village || addr.suburb || addr.county || addr.state || '';
            const city = cleanLocText(cityRaw);
            
            tempBatchList[index].loc = city && city !== country ? `${city}，${country}` : country;
            
            locPreview = document.getElementById(`batch-loc-preview-${index}`);
            if(locPreview) locPreview.innerText = `📍 ${tempBatchList[index].loc}`;
        } else {
            locPreview = document.getElementById(`batch-loc-preview-${index}`);
            if(locPreview) locPreview.innerText = '⚠️ 無法辨識地點';
        }
    } catch(e) {
        locPreview = document.getElementById(`batch-loc-preview-${index}`);
        if(locPreview) locPreview.innerText = '⚠️ 網路錯誤';
    }
}

let coordDebounceTimer;
document.getElementById('edit-coord-input').addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9.,\- ]/g, '');
    clearTimeout(coordDebounceTimer);
    
    const val = this.value;
    coordDebounceTimer = setTimeout(() => {
        const parts = val.split(',').map(s => s.trim());
        if (parts.length === 2 && parts[0] && parts[1]) {
            const lat = parseFloat(parts[0]);
            const lon = parseFloat(parts[1]);
            if (!isNaN(lat) && !isNaN(lon)) {
                detectLocationFromCoords(lat, lon, 'edit-loc-input');
            }
        }
    }, 800);
});

async function detectLocationFromCoords(lat, lon, targetInputId) {
    const input = document.getElementById(targetInputId);
    if(input) input.value = '🔍 偵測地點與時區中...';
    
    try {
        const [locRes, tz] = await Promise.all([
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-TW`),
            fetchTimeZone(lat, lon)
        ]);

        if (tz) currentEditTz = tz; 
        
        const data = await locRes.json();
        if (data && data.address) {
            const addr = data.address;
            
            const country = cleanLocText(addr.country);
            const cityRaw = addr.city || addr.town || addr.village || addr.suburb || addr.county || addr.state || '';
            const city = cleanLocText(cityRaw);
            
            const locStr = city && city !== country ? `${city}，${country}` : country;
            
            if(input) input.value = locStr;
            currentEditCountry = country; 
            showToast('📍 已自動更新地點與時區');
        } else {
            if(input) input.value = '';
            showToast('⚠️ 無法辨識該座標');
        }
    } catch (e) {
        console.error(e);
        if(input) input.value = '';
        showToast('⚠️ 網路錯誤，無法偵測地點');
    }
}

function saveEdit() {
  const nc = document.getElementById('edit-coord-input').value;
  const nn = document.getElementById('edit-name-input').value.trim();
  const nl = document.getElementById('edit-loc-input').value.trim(); 
  
  if (!nc || !nn || !nl) {
      showToast('⚠️ 請填寫完整資訊');
      return; 
  }

  const oldList = currentEditCat === 'flower' ? flowerCards : mushroomCards;
  const idx = oldList.findIndex(x => x.id == currentEditId);
  
  if(idx > -1){
    const c = oldList[idx];
    c.coord = nc;
    c.name = nn;
    c.loc = nl; 
    c.tz = currentEditTz; 
    
    if (tempEditImg) c.img = tempEditImg; 
    if (tempEditOriginalImg) c.originalImg = tempEditOriginalImg; 
    if (tempEditCropData) c.cropData = tempEditCropData; 
    
    const locParts = nl.split(/[,，]/);
    c.country = currentEditCountry || (locParts.length > 1 ? locParts[locParts.length - 1].trim() : nl);
    
    c.themes = tempEditThemes.length > 0 ? [...tempEditThemes] : ['🏷️ 未分類'];

    if (currentEditCat !== currentEditType) {
        oldList.splice(idx, 1);
        const newList = currentEditType === 'flower' ? flowerCards : mushroomCards;
        newList.push(c);
    }
    refreshCurrentView();

  showToast('✅ 明信片已更新');
  
  saveDataToLocal();

function handleDragStart(e) { 
  isSwiping = false; 
  swipeDirection = null; 
  dragStartX = e.type.includes('mouse') ? e.pageX : e.touches[0].screenX; 
  dragStartY = e.type.includes('mouse') ? e.pageY : e.touches[0].screenY; 
}

function handleDragMove(e) {
  if (!dragStartX || !e.touches) return;
  
  let dx = e.touches[0].screenX - dragStartX;
  let dy = e.touches[0].screenY - dragStartY;

  if (!swipeDirection) {
    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      swipeDirection = 'h'; 
    } else if (Math.abs(dy) > 10) {
      swipeDirection = 'v'; 
    }
  }

  if (swipeDirection === 'h') {
    if (e.cancelable) {
      e.preventDefault();
    }
  }
}

function handleDragEnd(e, el) {
  if (!dragStartX) return;
  let dx = (e.type.includes('mouse') ? e.pageX : e.changedTouches[0].screenX) - dragStartX;
  let dy = (e.type.includes('mouse') ? e.pageY : e.changedTouches[0].screenY) - dragStartY;
  
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) { 
    isSwiping = true; 
    if (dx < -40) { 
      resetSwipes(); 
      el.classList.add('swiped'); 
    } else if (dx > 40) { 
      el.classList.remove('swiped');
    }
  }
  dragStartX = 0;
  dragStartY = 0;
}

              <button class="mac-btn edit-btn" onclick="promptEdit(event,'${cat}','${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            </div>
          </div>
          
          <div class="postcard-tags" style="margin-bottom:12px;">
            ${c.themes.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          
          <div class="postcard-footer" style="margin-top:20px; border-top: 1.5px dashed var(--border); padding-top:16px;">
            <div class="coord-btn" onclick="copyCoord(event,'${c.coord}')">${c.coord}</div>
            <button class="btn-danger" style="width:auto; padding:8px 24px; border-radius:99px; font-size:0.85rem;" onclick="executeToggleOwnedBtn(event, '${cat}', '${c.id}')">取消收藏</button>
          </div>
        </div>
      </div>
      
    </div>
  `;
}

function handleGlobalSearch() {
  const q = document.getElementById('global-search').value.toLowerCase();
  const res = document.getElementById('search-results-section');
  if(!q){ res.style.display='none'; return; }
  const all = [...flowerCards, ...mushroomCards];
  const filter = all.filter(c => c.name.toLowerCase().includes(q) || c.loc.toLowerCase().includes(q) || c.themes.some(t => t.toLowerCase().includes(q)));
  res.style.display='block';
  res.innerHTML = filter.length > 0 
    ? filter.map(c => cardHTML(c, flowerCards.includes(c)?'':'mushroom-thumb', flowerCards.includes(c)?'flower':'mushroom')).join('') 
    : '<p style="text-align:center;color:var(--sub);font-size:0.85rem;padding:20px;">無搜尋結果</p>';
}

function renderCat(cat, mode) {
  const raw = cat === 'flower' ? flowerCards : mushroomCards;
  const body = document.getElementById(cat + '-body');
  const fw = document.getElementById(cat + '-filters');
  let processed = hideOwnedState[cat] ? raw.filter(x => !x.owned) : [...raw];
  
  if (mode === 'favorite') { 
    fw.style.display = 'none'; 
    const favs = processed.filter(x => x.favorite); 
    favs.sort((a,b) => a.owned - b.owned); 
    body.innerHTML = favs.length > 0 
      ? favs.map(x => cardHTML(x, cat==='mushroom'?'mushroom-thumb':'', cat)).join('') 
      : '<div style="text-align:center; padding:40px; color:var(--sub);">還沒收藏的最愛喔 ⭐</div>'; 
    return; 
  }
  
  fw.style.display = 'flex'; 
  const gs = {};
  const allCurrentThemes = [...defaultThemes, ...customThemes];
  
  if (mode === 'theme') {
    allCurrentThemes.forEach(t => { gs[t] = []; });
    processed.forEach(x => { x.themes.forEach(t => { if(!gs[t]) gs[t] = []; gs[t].push(x); }); });
  } else {
    processed.forEach(x => { const k = x.country; if(!gs[k]) gs[k] = []; gs[k].push(x); });
  }
  
  Object.keys(gs).forEach(key => {
    gs[key].sort((a, b) => {
      if (a.owned === b.owned) return 0;
      return a.owned ? 1 : -1;
    });
  });

  const cf = activeFilters[cat] || '全部'; 
  let fH = `<div class="filter-pill ${cf==='全部'?'active':''}" onclick="applyFilter('${cat}','${mode}','全部')">🌍 全部</div>`;
  
  Object.keys(gs).forEach(n => {
    fH += `<div class="filter-pill ${cf===n?'active':''}" onclick="applyFilter('${cat}','${mode}','${n}')">${n}</div>`;
  });

  if (mode === 'theme') { 
    fH += `<button class="add-theme-btn" style="margin-left: 6px;" onclick="openAddThemeModal()">＋</button>`; 
    fH += `<button class="add-theme-btn manage-theme-btn" style="margin-left: 6px;" onclick="openManageThemeModal()">⚙️</button>`; 
  }
  fw.innerHTML = fH;
  
  let bH = '';
  Object.entries(gs).forEach(([l, items]) => { 
    if(cf === '全部') {
      if (items.length > 0) bH += `<div class="group-section"><div class="group-header">${l} <span class="group-count">${items.length}</span></div>${items.map(x => cardHTML(x, cat==='mushroom'?'mushroom-thumb':'', cat)).join('')}</div>`; 
    } else if (cf === l) {
      if (items.length > 0) bH += `<div class="group-section"><div class="group-header">${l} <span class="group-count">${items.length}</span></div>${items.map(x => cardHTML(x, cat==='mushroom'?'mushroom-thumb':'', cat)).join('')}</div>`;
      else bH = '<div style="text-align:center; padding:40px; color:var(--sub);">此分類尚無明信片 📭</div>';
    }
  });
  
  if (cf === '全部' && bH === '') bH = '<div style="text-align:center; padding:40px; color:var(--sub);">快去收集明信片吧！</div>';
  body.innerHTML = bH;
}

function renderOwned() {
  const body = document.getElementById('owned-body');
  const f = flowerCards.filter(x => x.owned); const m = mushroomCards.filter(x => x.owned);
  
  if(!f.length && !m.length){ body.innerHTML = '<div style="text-align:center; padding:40px; color:var(--sub);">還沒收藏喔🎒</div>'; return; }
  
  let h = '';
  if(f.length) {
    h += `<div class="group-section"><div class="group-header" style="padding:0 16px;">🌸 花點收藏 <span class="group-count">${f.length}</span></div><div class="postcard-stack">${f.map(x => stackCardHTML(x, 'flower')).join('')}</div></div>`;
  }
  if(m.length) {
    h += `<div class="group-section"><div class="group-header" style="padding:0 16px;">🍄 菇點收藏 <span class="group-count">${m.length}</span></div><div class="postcard-stack">${m.map(x => stackCardHTML(x, 'mushroom')).join('')}</div></div>`;
  }
  body.innerHTML = h;
}

function resetEditInput() { document.getElementById('edit-coord-input').value = originalCoordBeforeEdit; showToast('🔄 已還原'); }
function switchSubTab(cat, tab, el) { 
  const s = document.getElementById('screen-'+cat); 
  s.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active')); 
  el.classList.add('active'); 
  activeSubTabs[cat] = tab; 
  activeFilters[cat] = '全部'; 
  refreshCurrentView(); 
}
function applyFilter(cat, mode, val) { activeFilters[cat] = val; refreshCurrentView(); }
function toggleHideOwned(cat) { hideOwnedState[cat] = !hideOwnedState[cat]; refreshCurrentView(); }
function promptHardDelete(e, cat, id) { e.stopPropagation(); resetSwipes(); currentDelCat = cat; currentDelId = id; openModal('deleteConfirmModal'); }
function copyCoord(e, c) { e.stopPropagation(); const b = e.currentTarget; b.textContent = '✅ 已複製！'; showToast('📋 已複製'); setTimeout(() => { b.textContent = c; }, 2000); }

function openModal(id) { 
  document.getElementById(id).classList.add('open'); 
  document.getElementById('global-nav').classList.add('hidden-dock');
  document.body.style.overflow = 'hidden'; 
}
function closeModal(id) { 
  document.getElementById(id).classList.remove('open'); 
  if (document.querySelectorAll('.modal-overlay.open').length === 0) {
      document.getElementById('global-nav').classList.remove('hidden-dock');
      document.body.style.overflow = ''; 
  }
  if(id==='confirmModal') pendingRemoveCard = null; 
}
function closeModalOutside(e, id) { if(e.target.id === id) closeModal(id); }
function resetSwipes() { document.querySelectorAll('.postcard.swiped').forEach(el => el.classList.remove('swiped')); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

function enableDragScroll() {
  const sliders = document.querySelectorAll('.quick-filter-wrapper, .theme-selector');
  sliders.forEach(slider => {
    const newSlider = slider.cloneNode(true);
    slider.parentNode.replaceChild(newSlider, slider);
    
    let isDown = false;
    let startX;
    let scrollLeft;
    let isDragging = false; 

    newSlider.addEventListener('mousedown', (e) => {
      isDown = true;
      isDragging = false;
      newSlider.style.cursor = 'grabbing';
      startX = e.pageX - newSlider.offsetLeft;
      scrollLeft = newSlider.scrollLeft;
    });
    
    newSlider.addEventListener('mouseleave', () => {
      isDown = false;
      newSlider.style.cursor = 'grab';
    });
    
    newSlider.addEventListener('mouseup', () => {
      isDown = false;
      newSlider.style.cursor = 'grab';
      setTimeout(() => { isDragging = false; }, 0); 
    });
    
    newSlider.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - newSlider.offsetLeft;
      const walk = (x - startX) * 1.5; 
      if (Math.abs(walk) > 3) isDragging = true; 
      newSlider.scrollLeft = scrollLeft - walk;
    });

    newSlider.addEventListener('click', (e) => {
      if (isDragging) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    newSlider.addEventListener('wheel', (e) => {
      if (e.deltaY !== 0) {
        e.preventDefault(); 
        newSlider.scrollLeft += e.deltaY > 0 ? 40 : -40; 
      }
    }, { passive: false });
  });
}

function initModalDrag() {
    document.querySelectorAll('.modal-handle').forEach(handle => {
        let startY = 0;
        let currentY = 0;
        const modal = handle.closest('.modal');
        const overlay = handle.closest('.modal-overlay');

        handle.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            currentY = startY;
            modal.style.transition = 'none';
        }, {passive: true});

        handle.addEventListener('touchmove', (e) => {
            currentY = e.touches[0].clientY;
            const dy = currentY - startY;
            if (dy > 0) {
                e.preventDefault(); 
                modal.style.transform = `translateY(${dy}px)`;
            }
        }, {passive: false});

        handle.addEventListener('touchend', (e) => {
            const dy = currentY - startY;
            modal.style.transition = 'transform 0.3s ease';
            if (dy > 80) {
                closeModal(overlay.id);
                setTimeout(() => { modal.style.transform = ''; }, 300);
            } else {
                modal.style.transform = '';
            }
        });
    });
}

setTimeout(() => { 
  goTo('home'); 
  initModalDrag(); 
}, 50);
</script>
